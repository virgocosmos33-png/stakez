<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Madam Mirror: cracked hand mirror -->
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9c27a"/>
      <stop offset="0.5" stop-color="#a8863f"/>
      <stop offset="1" stop-color="#6e5423"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#e8dcff"/>
      <stop offset="0.45" stop-color="#9a7bd4"/>
      <stop offset="1" stop-color="#3c2a66"/>
    </radialGradient>
  </defs>
  <!-- handle -->
  <rect x="29" y="42" width="6" height="16" rx="3" fill="url(#frame)"/>
  <circle cx="32" cy="59" r="3.4" fill="url(#frame)"/>
  <!-- frame -->
  <circle cx="32" cy="24" r="20" fill="url(#frame)"/>
  <!-- glass -->
  <circle cx="32" cy="24" r="15.5" fill="url(#glass)"/>
  <!-- crack -->
  <path d="M24 12 L31 21 L27 25 L34 30 L31 36" stroke="#f4ecff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <path d="M31 21 L37 18 M34 30 L40 29" stroke="#f4ecff" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- glint -->
  <ellipse cx="26" cy="16" rx="4.5" ry="2.6" transform="rotate(-32 26 16)" fill="#ffffff" opacity="0.55"/>
</svg>
